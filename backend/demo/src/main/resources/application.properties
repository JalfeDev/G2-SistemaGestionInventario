spring.application.name=sistema-gestion-inventario
server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/hotelpiramide?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Lima}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=${JWT_SECRET:cambiar-este-secreto-jwt-sprint-1-minimo-32-caracteres}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

app.seed-admin.enabled=${SEED_ADMIN_ENABLED:true}
app.seed-admin.username=${SEED_ADMIN_USERNAME:admin}
app.seed-admin.password=${SEED_ADMIN_PASSWORD:admin123}

spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
