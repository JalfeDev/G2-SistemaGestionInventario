spring.application.name=sistema-gestion-inventario
spring.config.import=optional:file:.env[.properties]
server.port=${SERVER_PORT}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS}

app.seed-admin.enabled=${SEED_ADMIN_ENABLED}
app.seed-admin.username=${SEED_ADMIN_USERNAME}
app.seed-admin.password=${SEED_ADMIN_PASSWORD}

spring.mail.host=${SMTP_HOST}
spring.mail.port=${SMTP_PORT}
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.notifications.stock.enabled=${STOCK_NOTIFICATIONS_ENABLED:false}
app.notifications.stock.email-encargado=${STOCK_NOTIFICATIONS_EMAIL_ENCARGADO:}
app.notifications.stock.email-gerente=${STOCK_NOTIFICATIONS_EMAIL_GERENTE:}

app.notifications.solicitud.enabled=${SOLICITUD_NOTIFICATIONS_ENABLED:false}
app.notifications.solicitud.email-encargado=${SOLICITUD_NOTIFICATIONS_EMAIL_ENCARGADO:}

app.frontend-url=${FRONTEND_URL:http://localhost:5173}

# Avoid Actuator/JMX failing health checks when SMTP credentials are not configured.
management.health.mail.enabled=false
